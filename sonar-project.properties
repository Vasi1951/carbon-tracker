# SonarQube Project Configuration
sonar.projectKey=carbon-tracker
sonar.projectName=carbon-tracker
sonar.projectVersion=1.0.0

# Path to source directories
sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,e2e/**/*
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,coverage/**,e2e/**/*

# Language & Encoding
sonar.sourceEncoding=UTF-8

# Zero-tolerance code duplication threshold
# Enforcing 0% duplication by setting very strict block sizes and token limits
sonar.cpd.ts.minimumLines=2
sonar.cpd.ts.minimumTokens=10

# Code Quality Thresholds
# Maximum cyclomatic complexity per function
sonar.javascript.functions.complexity.threshold=8
sonar.typescript.functions.complexity.threshold=8

# Test Coverage Thresholds
# Enforcing minimum 90% unit test coverage
sonar.javascript.coverage.reportPaths=coverage/lcov.info
sonar.typescript.coverage.reportPaths=coverage/lcov.info
sonar.coverage.required=90
